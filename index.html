<section id="cost-calculator">
    <h2>Cost Calculator</h2>
    <form>
        <label for="nights">Number of Nights:</label>
        <input type="number" id="nights" name="nights" min="1" required>

        <label for="price-per-night">Price Per Night ($):</label>
        <input type="number" id="price-per-night" name="price-per-night" min="0" required>

        <input type="submit" value="Calculate">
    </form>
    <p id="total-cost"></p>
</section>
<script>
    document.querySelector('form').addEventListener('submit', function(event) {
        event.preventDefault();
        const nights = parseInt(document.getElementById('nights').value);
        const pricePerNight = parseFloat(document.getElementById('price-per-night').value);
        const totalCost = nights * pricePerNight;
        document.getElementById('total-cost').innerText = `Total Cost: $${totalCost.toFixed(2)}`;
    });
</script>
